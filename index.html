<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมุดการบ้านดิจิทัล - Homework & Card System</title>
    <meta name="description" content="ระบบติดตามการบ้าน แบ่งรายวิชา สำหรับครู นักเรียน และผู้ปกครอง พร้อมระบบการ์ดพิเศษ">
    <!-- Google Fonts: Kanit สำหรับทั่วไป และ Mali สำหรับตัวหนังสือที่ดูน่ารักเป็นมิตร -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for cute icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR Code Generator (สร้าง QR Code) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- html5-qrcode (สแกนกล้องจริงในโหมด Production) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- CSS Style Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Phone Mockup Frame -->
        <div class="phone-frame">
            <div class="phone-status-bar">
                <span class="phone-time">09:41</span>
                <div class="phone-notch"></div>
                <div class="phone-icons">
                    <i class="fa-solid fa-signal"></i>
                    <i class="fa-solid fa-wifi"></i>
                    <i class="fa-solid fa-battery-three-quarters"></i>
                </div>
            </div>
            
            <div class="phone-screen" id="phone-screen">
                <!-- หน้าจอเนื้อหาแอปพลิเคชันจะถูกเรนเดอร์แบบ Dynamic ที่นี่ -->
                <div class="loading-screen">
                    <div class="spinner"></div>
                    <p>กำลังเปิดสมุดจดการบ้าน...</p>
                </div>
            </div>
            
            <div class="phone-home-indicator"></div>
        </div>
    </div>

    <!-- Modal สำหรับแสดงผลการสแกน QR Code จำลอง / การเทรดการ์ด -->
    <div class="custom-modal" id="qr-trade-modal">
        <div class="modal-content">
            <span class="close-modal-btn" id="close-qr-modal-btn">&times;</span>
            <div id="modal-trade-area">
                <!-- รายละเอียดการสแกนและยืนยันการเทรดการ์ด -->
            </div>
        </div>
    </div>

    <!-- Main JavaScript Code -->
    <script type="module" src="app.js"></script>
</body>
</html>
